name: Deploy to PythonAnywhere
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest code on PythonAnywhere
        run: |
          curl -X POST \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            "https://www.pythonanywhere.com/api/v0/user/CodyCBakerPhD/webapps/pozu-CodyCBakerPhD.pythonanywhere.com/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ssh.pythonanywhere.com
          username: CodyCBakerPhD
          key: ${{ secrets.PA_SSH_KEY }}
          script: |
            cd ~/mysite/pozu-backend
            git pull origin main

      - name: Reload webapp
        run: |
          curl -X POST \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            "https://www.pythonanywhere.com/api/v0/user/CodyCBakerPhD/webapps/pozu-CodyCBakerPhD.pythonanywhere.com/reload/"
